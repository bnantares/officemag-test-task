<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Test task for frontend development (Officemag)">
    <title>Text Task - Form</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main>
        <section class="form__section">
            <div class="form__container">
                <div class="form__title">
                    <h2>Заполните поля</h2>
                    <h4>ну пожалуйста</h4>
                </div>
                <form class="form__body">
                    <label class="form__row">
                        <h3 class="form__block">Основное</h3>
                        <span class="form__label">Имя</span>
                        <input type="text" class="form__input" placeholder="по паспорту">
                    </label>
                    <label class="form__row form__row--compact">
                        <span class="form__label">Цвет вашего настроения</span>
                        <input type="color" class="form__input">
                    </label>
                    <div class="form__row">
                        <h3 class="form__block">Дополнительное</h3>
                        <label class="form__row">
                            <span class="form__label">Комментарий</span>
                            <textarea class="form__input form__input--text"
                                placeholder="Напишите хоть что-нибудь.&#10;Если хотите, конечно"></textarea>
                        </label>
                    </div>
                    <label class="form__option">
                        <input type="radio" class="form__radio">
                        <span class="form__radio-mark"></span>
                        <span class="form__option--text">
                            Ну а тут просто полежит радиобатон
                        </span>
                    </label>
                    <label class="form__option">
                        <input type="checkbox" class="form__checkbox">
                        <span class="form__checkmark"></span>
                        <span class="form__option--text">
                            Соглашаюсь на всё, что бы вы не придумали и осознаю, что это может означать <a href="#">что
                                угодно</a>
                        </span>
                    </label>
                    <button class="form__button" type="submit">Отправить все мои данные</button>
                </form>
            </div>
        </section>
    </main>
</body>

</html>
